<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频管理后台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
    body { background: #f5f7fa; padding: 20px; color: #1f2937; }
    .container { max-width: 960px; margin: 0 auto; }
    h1 { margin-bottom: 20px; font-size: 24px; }
    .auth-section { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .auth-section input { width: 300px; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px; margin-right: 10px; }
    button { padding: 8px 16px; border: none; border-radius: 8px; background: #4a90e2; color: #fff; cursor: pointer; font-weight: 500; }
    button:hover { opacity: 0.9; }
    button.danger { background: #ef4444; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #e5e7eb; }
    th { background: #f9fafb; font-weight: 600; }
    .form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
    .form-row input, .form-row select { padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px; }
    .msg { color: green; margin: 10px 0; }
    .error { color: red; }
  </style>
</head>
<body>
<div class="container">
  <h1>视频管理</h1>

  <div class="auth-section" id="authSection">
    <label>管理员密钥：</label>
    <input type="password" id="adminKeyInput" placeholder="请输入管理员密钥">
    <button onclick="login()">登录</button>
    <div id="authMsg" class="error" style="margin-top:8px;"></div>
  </div>

  <div id="mainSection" style="display:none;">
    <div style="background:#fff;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
      <h3 style="margin-bottom:12px;">设置主推视频</h3>
      <select id="featuredSelect" style="padding:8px 12px;border-radius:8px;border:1px solid #d1d5db;">
        <option value="">-- 请选择视频 --</option>
      </select>
      <button onclick="setFeatured()" style="margin-left:10px;">设为主推</button>
      <span id="featuredMsg" class="msg"></span>
    </div>

    <h3>视频列表</h3>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr><th>标题</th><th>来源</th><th>分类</th><th>权重</th><th>操作</th></tr>
        </thead>
        <tbody id="videoTbody"></tbody>
      </table>
    </div>

    <div style="background:#fff;border-radius:12px;padding:20px;margin-top:20px;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
      <h3 id="formTitle">添加 / 编辑视频</h3>
      <div class="form-row">
        <input type="text" id="vId" placeholder="视频 ID（唯一）">
        <input type="text" id="vTitle" placeholder="标题">
        <input type="text" id="vUrl" placeholder="视频播放地址">
        <input type="text" id="vCover" placeholder="封面图片地址">
      </div>
      <div class="form-row">
        <select id="vSource">
          <option value="Original">原创</option>
          <option value="YouTube">YouTube</option>
          <option value="Dailymotion">Dailymotion</option>
          <option value="Odysee">Odysee</option>
          <option value="PeerTube">PeerTube</option>
          <option value="Keso">可颂</option>
          <option value="Xiaohongshu">小红书</option>
        </select>
        <select id="vCategory">
          <option value="Creative Food">创意美食</option>
          <option value="Cooking Tutorial">烹饪教程</option>
          <option value="Dessert & Drinks">甜品饮品</option>
          <option value="Creator Picks">博主精选</option>
        </select>
        <input type="number" id="vWeight" placeholder="权重（数字越大越靠前）" value="0">
      </div>
      <button onclick="saveVideo()">保存视频</button>
      <button onclick="resetForm()" style="background:#6b7280;margin-left:10px;">重置</button>
      <div id="formMsg" class="msg"></div>
    </div>
  </div>
</div>

<script>
  const API_BASE = 'https://vid.taropai.com';
  let adminKey = sessionStorage.getItem('adminKey') || '';

  function getHeaders() {
    const h = new Headers();
    h.append('Content-Type', 'application/json');
    if (adminKey) h.append('X-Admin-Key', adminKey);
    return h;
  }

  async function login() {
    adminKey = document.getElementById('adminKeyInput').value.trim();
    if (!adminKey) return;
    try {
      const res = await fetch(`${API_BASE}/api/admin/videos`, { headers: getHeaders() });
      if (res.ok) {
        sessionStorage.setItem('adminKey', adminKey);
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('mainSection').style.display = 'block';
        await loadVideos();
      } else {
        document.getElementById('authMsg').innerText = '密钥错误，请重试';
      }
    } catch (e) {
      document.getElementById('authMsg').innerText = '网络连接失败';
    }
  }

  window.onload = function() {
    if (adminKey) {
      document.getElementById('adminKeyInput').value = adminKey;
      login();
    }
  };

  async function loadVideos() {
    const res = await fetch(`${API_BASE}/api/admin/videos`, { headers: getHeaders() });
    const data = await res.json();
    const videos = data.videos || [];
    renderTable(videos);
    const sel = document.getElementById('featuredSelect');
    sel.innerHTML = '<option value="">-- 请选择视频 --</option>' +
      videos.map(v => `<option value="${v.id}">${v.title}</option>`).join('');
  }

  function renderTable(videos) {
    const tbody = document.getElementById('videoTbody');
    tbody.innerHTML = videos.map(v => `
      <tr>
        <td>${v.title}</td>
        <td>${v.source}</td>
        <td>${v.category}</td>
        <td>${v.weight}</td>
        <td>
          <button onclick="editVideo('${v.id}')">编辑</button>
          <button class="danger" onclick="deleteVideo('${v.id}')">删除</button>
        </td>
      </tr>
    `).join('');
  }

  window.editVideo = async function(id) {
    try {
      const res = await fetch(`${API_BASE}/api/admin/videos`, { headers: getHeaders() });
      const data = await res.json();
      const videos = data.videos || [];
      const v = videos.find(v => v.id === id);
      if (!v) {
        alert('未找到该视频');
        return;
      }
      document.getElementById('vId').value = v.id;
      document.getElementById('vTitle').value = v.title;
      document.getElementById('vUrl').value = v.url;
      document.getElementById('vCover').value = v.cover || '';
      document.getElementById('vSource').value = v.source;
      document.getElementById('vCategory').value = v.category;
      document.getElementById('vWeight').value = v.weight;
      document.getElementById('vId').disabled = true;
      document.getElementById('formTitle').innerText = '编辑视频';
      window.scrollTo({ top: document.getElementById('vId').offsetTop - 100, behavior: 'smooth' });
    } catch (e) {
      alert('获取视频失败：' + e.message);
    }
  };

  window.saveVideo = async function() {
    const id = document.getElementById('vId').value.trim();
    const title = document.getElementById('vTitle').value.trim();
    const url = document.getElementById('vUrl').value.trim();
    if (!id || !title || !url) {
      document.getElementById('formMsg').innerText = '请填写 ID、标题和播放地址';
      return;
    }
    const video = {
      id: id,
      title: title,
      url: url,
      cover: document.getElementById('vCover').value.trim(),
      source: document.getElementById('vSource').value,
      category: document.getElementById('vCategory').value,
      weight: parseInt(document.getElementById('vWeight').value) || 0
    };
    try {
      const res = await fetch(`${API_BASE}/api/admin/videos`, {
        method: 'POST',
        headers: getHeaders(),
        body: JSON.stringify(video)
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('formMsg').innerText = '保存成功！';
        resetForm();
        await loadVideos();
      } else {
        document.getElementById('formMsg').innerText = data.error || '保存失败';
      }
    } catch (e) {
      document.getElementById('formMsg').innerText = '网络错误，请稍后重试';
    }
  };

  window.resetForm = function() {
    document.getElementById('vId').disabled = false;
    document.getElementById('vId').value = '';
    document.getElementById('vTitle').value = '';
    document.getElementById('vUrl').value = '';
    document.getElementById('vCover').value = '';
    document.getElementById('vWeight').value = '0';
    document.getElementById('formTitle').innerText = '添加 / 编辑视频';
    document.getElementById('formMsg').innerText = '';
  };

  window.deleteVideo = async function(id) {
    if (!confirm('确定要删除这个视频吗？')) return;
    try {
      const res = await fetch(`${API_BASE}/api/admin/videos?id=${encodeURIComponent(id)}`, {
        method: 'DELETE',
        headers: getHeaders()
      });
      const data = await res.json();
      if (data.success) {
        await loadVideos();
      } else {
        alert('删除失败');
      }
    } catch (e) {
      alert('网络错误，删除失败');
    }
  };

  window.setFeatured = async function() {
    const sel = document.getElementById('featuredSelect');
    const id = sel.value;
    if (!id) return;
    try {
      const res = await fetch(`${API_BASE}/api/admin/videos/featured`, {
        method: 'PUT',
        headers: getHeaders(),
        body: JSON.stringify({ id: id })
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('featuredMsg').innerText = '主推视频已更新！';
      } else {
        document.getElementById('featuredMsg').innerText = '操作失败：' + (data.error || '');
      }
    } catch (e) {
      document.getElementById('featuredMsg').innerText = '网络错误，请稍后重试';
    }
  };
</script>
</body>
</html>
